[agents.claude-pro]
type = "claude-pro"
model = "claude-sonnet-4-5"
# token = "sk-ant-oat01-..."             # put token directly here (takes precedence)
# token_env = "CLAUDE_CODE_OAUTH_TOKEN"  # or name the env var (default: CLAUDE_CODE_OAUTH_TOKEN)

[agents.claude-api]
type = "claude-api"
model = "claude-sonnet-4-5"
api_key_env = "ANTHROPIC_API_KEY"

[agents.docker]
type = "docker"
image = "ubuntu:22.04"
