# valkyrie.sample.toml
# Copy to valkyrie.toml and configure.
# export VALKYRIE_CONFIG=./valkyrie.toml

[auth]
# For local use — no token required:
# disabled = true

# For remote/shared use — set a bearer token:
# token = "your-secret-token"
# Or: export VALKYRIE_API_TOKEN=your-secret-token

[agents.claude-pro]
type = "claude-pro"
model = "claude-sonnet-4-5"
# token = "sk-ant-oat01-..."  # from `claude setup-token` (or set CLAUDE_CODE_OAUTH_TOKEN env var)
# image = "ghcr.io/chrishayen/valkyrie-claude:latest"  # default

[agents.claude-api]
type = "claude-api"
model = "claude-sonnet-4-5"
api_key_env = "ANTHROPIC_API_KEY"

[agents.docker]
type = "docker"
image = "ubuntu:22.04"
