# Valkyrie config
# Copy to ~/.config/valkyrie/config.toml

[auth]
disabled = true  # set false (and add auth) before exposing to a network

[agents.claude-max]
type = "claude-max"
model = "claude-sonnet-4-5"
# token = "sk-ant-oat01-..."  # from `claude setup-token` (or set CLAUDE_CODE_OAUTH_TOKEN env var)
# image = "ghcr.io/chrishayen/valkyrie-claude:latest"  # default

[agents.claude-api]
type = "claude-api"
model = "claude-sonnet-4-5"
api_key_env = "ANTHROPIC_API_KEY"

[agents.docker]
type = "docker"
image = "ubuntu:22.04"
